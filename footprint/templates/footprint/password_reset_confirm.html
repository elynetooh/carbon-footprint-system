{% extends 'footprint/base.html' %}
{% block content %}
<div style="max-width:480px;margin:60px auto;background:#fff;border-radius:12px;border:1px solid #e0e0e0;padding:36px;">
  <h2 style="margin:0 0 8px;font-size:20px;">Set new password</h2>
  <p style="color:#666;font-size:13px;margin-bottom:24px;">Enter your new password below.</p>
  <form method="POST">
    {% csrf_token %}
    <label style="font-size:12px;font-weight:600;color:#555;">NEW PASSWORD</label>
    <input type="password" name="new_password1" required
      style="width:100%;height:42px;border:1px solid #ccc;border-radius:8px;padding:0 12px;font-size:14px;margin:6px 0 16px;box-sizing:border-box;">
    <label style="font-size:12px;font-weight:600;color:#555;">CONFIRM NEW PASSWORD</label>
    <input type="password" name="new_password2" required
      style="width:100%;height:42px;border:1px solid #ccc;border-radius:8px;padding:0 12px;font-size:14px;margin:6px 0 20px;box-sizing:border-box;">
    <button type="submit"
      style="width:100%;height:42px;background:#1a4a2e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;">
      Set New Password
    </button>
  </form>
</div>
{% endblock %}
